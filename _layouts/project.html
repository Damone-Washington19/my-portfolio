---
layout: default
---
<article class="project">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    {% if page.tech %}
    <ul class="tech-list">
      {% for item in page.tech %}<li>{{ item }}</li>{% endfor %}
    </ul>
    {% endif %}
    <div class="project-links">
      {% if page.repo %}<a href="{{ page.repo }}" target="_blank" rel="noopener">View Code</a>{% endif %}
      {% if page.demo %}<a href="{{ page.demo }}" target="_blank" rel="noopener">Live Demo</a>{% endif %}
    </div>
  </header>
  <div class="project-body">
    {{ content }}
  </div>
</article>
