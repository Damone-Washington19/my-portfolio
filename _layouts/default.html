<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <div id="container">
      <div class="inner">

        <header>
          <h1>{{ site.title }}</h1>
          <h2>{{ site.description }}</h2>
        </header>

        <section id="downloads" class="clearfix">
          <a href="{{ '/' | relative_url }}" class="button"><span>Home</span></a>
          <a href="{{ '/about.html' | relative_url }}" class="button"><span>About</span></a>
          <a href="{{ '/projects/' | relative_url }}" class="button"><span>Projects</span></a>
          <a href="{{ '/Damone_Washington.pdf' | relative_url }}" class="button"><span>Resume</span></a>
          <a href="https://github.com/Damone-Washington19" class="button" target="_blank" rel="noopener"><span>GitHub</span></a>
          <a href="https://www.linkedin.com/in/damone-washington-548765325/" class="button" target="_blank" rel="noopener"><span>LinkedIn</span></a>
        </section>

        <hr>

        <section id="main_content">
          {{ content }}
        </section>

        <footer>
          <p>&copy; {{ site.title }} &mdash; Built with Jekyll</p>
        </footer>

      </div>
    </div>
  </body>
</html>
